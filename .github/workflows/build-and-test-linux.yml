name: Build and test for Linux

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/magnutic/mg-engine:master

    strategy:
      matrix:
        build_type: [Debug, Release]
        c_compiler: [gcc, clang]
        include:
          - c_compiler: gcc
            cpp_compiler: g++
          - c_compiler: clang
            cpp_compiler: clang++

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Configure CMake
      run: >
        cmake
        -S .  -B ./ci_build
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DMG_DEPENDENCIES_DIR=/opt/mg_deps/

    - name: Build
      run: cmake --build ./ci_build --config ${{ matrix.build_type }} -j $(nproc)

    - name: Test
      working-directory: ./ci_build
      run: ctest --build-config ${{ matrix.build_type }}
